# Frontend-only Compose file. The Supabase stack (Postgres, API, Studio,
# Edge Runtime) is owned and managed by the Supabase CLI in its own Docker
# containers; this file adds just the Vite dev server.
#
# Run via script/server, which exports VITE_SUPABASE_URL / _PUBLISHABLE_KEY
# from `supabase status` before bringing this up.
name: team-jeopardy

services:
  web:
    image: node:22.17.1-bookworm-slim
    working_dir: /app
    command: npm run dev
    ports:
      - "8080:8080" # Vite (vite.config.ts binds host :: port 8080)
    environment:
      # Injected by script/server (local Supabase). Left empty otherwise, in
      # which case client.ts falls back to the hosted project for BOTH values.
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
    volumes:
      - .:/app # bind mount for hot reload
      - node_modules:/app/node_modules # deps live in a named volume, not the host

volumes:
  node_modules:
